name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Deploy lo maneja Railway nativamente via GitHub integration (Settings → Source)
# Este workflow solo verifica que el código compila antes de que Railway lo tome.

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore DataMedix.Portal/DataMedix.Portal.csproj

      - name: Build
        run: dotnet build DataMedix.Portal/DataMedix.Portal.csproj -c Release --no-restore
